text_extensions: [ 'coffee', 'css', 'erb', 'haml', 'handlebars', 'hb', 'htm', 'html', 'js', 'less', 'markdown', 'md', 'ms', 'mustache', 'php', 'rb', 'sass', 'scss', 'txt', 'xhtml', 'xml', 'json' ]
output_dir: output
index_filenames: [ 'index.html' ]
enable_output_diff: true
prune:
  auto_prune: true
  exclude: [ '.git', '.hg', '.svn', 'CVS' ]
data_sources:
  - type: filesystem
    encoding: utf-8

environments:
  default:
    dev: true
    site:
      url: 'http://localhost:3000' # FIXME not very nice to hardcode port
      name: '🚧 Marilou &amp; Daphné'
  prod:
    dev: false
    site:
      url: 'https://famille.opatry.net'
      name: 'Marilou &amp; Daphné'

# site settings
site:
  uuid: 5e0a8bfc-3324-4c52-ae07-0431434e2421
  author: 'Olivier Patry'
  lang: 'fr'
  description: 'Photos des enfants de la famille Patry'
  theme_color: '#AD3F4C'
cover: /assets/cover/coverPicture_AllFamilyFeet2020.*
cover_width: 850
profilePicture: /assets/cover/profilePicture_MarilouDaphne2020.*
profilePicture_size: 150
err404Picture: /assets/cover/AllFamilyFakeMuseum2020.*
picture_quality: '85%'
picture_width:
  excerpt: 400 # width of photos when in an excerpt
  default: 600 # width of photos by default
page_size: 20 # number of posts by page
favicon_reprs: [ 'default' ]
start_year: 2012

